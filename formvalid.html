+<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formvalidate</title>
    <link rel="stylesheet" href="formvalid.css">
</head>
<body>
    <form id="formd">
        <h3>Registration</h3>
        <p id="errname"></p>
        <input type="text" id="name" placeholder="Enter your name"><br>

        <p id="errnum"></p>
        <input type="text" id="num" placeholder="Enter Number "><br>

        <p id="erremail"></p>
        <input type="text" id="email" placeholder="Enter email "><br>

        <p id="errpass"></p>
       <input type="text" id="pass"  placeholder="Enter Password "><br>

        <p id="errcpass"></p>
        <input type="text" id="cpass"  placeholder="Enter confirm Password"><br><br>

        <input type="submit" onclick="return formValidate()" >
    </form>
    <script src="formvalid.js"></script>
</body>
</html>
